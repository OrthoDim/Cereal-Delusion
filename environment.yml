name: clonebot-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # core
  - numpy>=2.0
  - flask>=3.1
  - sqlalchemy>=2.0
  - requests>=2.32
  - click>=8.1
  - pyyaml>=6.0
  - jinja2>=3.1
  - tabulate>=0.9

  # lab hardware
  - pyserial>=3.5
  - pyusb>=1.3
  - pymodbus>=3.6
  - websockets>=15.0
  - zeroconf>=0.148
  - grpcio>=1.78

  # jupyter / ipython
  - ipython>=8.18
  - ipykernel>=6.31
  - jupyter_client>=8.6
  - jupyter_core>=5.8
  - nbformat>=5.10
  - nbconvert>=7.16
  - nbclient>=0.10

  # docs (sphinx)
  - sphinx>=7.4
  - beautifulsoup4>=4.14
  - pygments>=2.19
  - babel>=2.18
  - docutils>=0.21
  - imagesize>=1.5
  - snowballstemmer>=3.0

  # dev tools
  - pytest>=8.4
  - pytest-timeout>=2.4
  - ruff>=0.15
  - mypy>=1.18

  - pip:
    # pylabrobot from source
    - -e git+https://github.com/PyLabRobot/pylabrobot@1b06c2228ced95ec366b6e4184bf78befd5d0ccf#egg=PyLabRobot

    # hardware drivers (pip-only)
    - hid==1.0.8
    - pylibftdi==0.23.0
    - libusb-package==1.0.26.1
    - opentrons-http-api-client==0.2.1
    - ifaddr==0.2.0

    # sphinx extensions (pip-only)
    - pydata-sphinx-theme>=0.16
    - myst-parser>=3.0
    - myst-nb>=1.3
    - sphinx-copybutton>=0.5
    - sphinx-last-updated-by-git>=0.3
    - sphinx-sitemap>=2.8
    - sphinx_reredirects>=0.1
    - accessible-pygments>=0.0.5
    - jupyterlab_pygments>=0.3
